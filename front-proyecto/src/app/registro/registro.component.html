<div class='registro-container'>
  <div class='registro-card'>
    <div class='logo'>✈️</div>
    <h1>AEROLINEA LOS PRIMOS</h1>
    <h2>REGISTRO DE USUARIO</h2>

    <div *ngIf='!mostrarPassword && !mostrarConfirmacion'>
      <div class='form-group'>
        <label>Numero de pasaporte *</label>
        <input type='text' [(ngModel)]='reg.pasaporte' placeholder='Max 15 caracteres' maxlength='15' />
      </div>
      <div class='form-group'>
        <label>Nombre completo *</label>
        <input type='text' [(ngModel)]='reg.nombre' placeholder='Nombre completo' />
      </div>
      <div class='form-group'>
        <label>Fecha de nacimiento *</label>
        <input type='date' [(ngModel)]='reg.fechaNacimiento' />
      </div>
      <div class='form-group'>
        <label>Nacionalidad *</label>
        <input type='text' [(ngModel)]='reg.nacionalidad' placeholder='Nacionalidad' />
      </div>
      <div class='form-group'>
        <label>Correo electronico *</label>
        <input type='email' [(ngModel)]='reg.correo' placeholder='correo@ejemplo.com' />
      </div>
      <div class='form-group'>
        <label>Telefono *</label>
        <div class='row'>
          <input type='text' [(ngModel)]='reg.codigoArea' placeholder='+502' class='small' maxlength='4' />
          <input type='text' [(ngModel)]='reg.telefono' placeholder='8 digitos' class='large' maxlength='8' />
        </div>
      </div>
      <div class='form-group'>
        <label>Numero de emergencias *</label>
        <input type='text' [(ngModel)]='reg.telefonoEmergencia' placeholder='Numero de emergencias' />
      </div>
      <div class='form-group'>
        <label>Direccion *</label>
        <input type='text' [(ngModel)]='reg.direccion' placeholder='Direccion' />
      </div>
      <p class='error' *ngIf='error'>{{ error }}</p>
      <button (click)='validar()'>VALIDAR</button>
      <p class='link' (click)='irALogin()'>Ya tienes cuenta? Inicia sesion</p>
    </div>

    <div *ngIf='mostrarPassword && !mostrarConfirmacion'>
      <p class='info'>Ingresa tu contrasena</p>
      <div class='form-group'>
        <input type='password' [(ngModel)]='reg.password' placeholder='Contrasena' />
      </div>
      <p class='hint'>Minimo 6 caracteres, debe incluir mayuscula, numero y caracter especial</p>
      <p class='error' *ngIf='error'>{{ error }}</p>
      <button (click)='confirmarPassword()'>CONTINUAR</button>
    </div>

    <div *ngIf='mostrarConfirmacion'>
      <p class='info'>Esta seguro de continuar?</p>
      <div class='btn-row'>
        <button class='btn-si' (click)='registrarse()'>SI</button>
        <button class='btn-no' (click)='cancelarRegistro()'>NO</button>
      </div>
      <p class='success' *ngIf='success'>{{ success }}</p>
    </div>

  </div>
</div>
