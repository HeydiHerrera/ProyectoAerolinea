<div class='reporte-container'>
  <div class='reporte-card'>
    <div class='logo'>✈️</div>
    <h1>AEROLINEA LOS PRIMOS</h1>
    <h2>REPORTE DE VUELOS POR FECHA Y HORA</h2>
    <div class='filtros'>
      <div class='form-row'>
        <div class='form-group'>
          <label>Fecha Desde *</label>
          <input type='date' [(ngModel)]='fechaDesde' />
        </div>
        <div class='form-group'>
          <label>Hora Desde *</label>
          <input type='time' [(ngModel)]='horaDesde' />
        </div>
      </div>
      <div class='form-row'>
        <div class='form-group'>
          <label>Fecha Hasta *</label>
          <input type='date' [(ngModel)]='fechaHasta' />
        </div>
        <div class='form-group'>
          <label>Hora Hasta *</label>
          <input type='time' [(ngModel)]='horaHasta' />
        </div>
      </div>
      <div class='btn-row'>
        <button class='btn-buscar' (click)='buscar()'>BUSCAR</button>
        <button class='btn-limpiar' (click)='limpiar()'>LIMPIAR</button>
      </div>
    </div>
    <p class='error' *ngIf='error'>{{ error }}</p>
    <div class='tabla-container' *ngIf='vuelos.length > 0'>
      <table>
        <thead>
          <tr>
            <th>Numero Vuelo</th>
            <th>Modelo</th>
            <th>Aerolinea</th>
            <th>Origen</th>
            <th>Destino</th>
            <th>Fecha Salida</th>
            <th>Fecha Llegada</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor='let v of vuelos'>
            <td>{{ v.numeroVuelo }}</td>
            <td>{{ v.modelo }}</td>
            <td>{{ v.aerolinea }}</td>
            <td>{{ v.origen }}</td>
            <td>{{ v.destino }}</td>
            <td>{{ v.fechaSalida }}</td>
            <td>{{ v.fechaLlegada }}</td>
          </tr>
        </tbody>
      </table>
      <div class='btn-export'>
        <button class='btn-pdf' (click)='imprimirPDF()'>📄 IMPRIMIR PDF</button>
        <button class='btn-excel' (click)='exportarExcel()'>📊 EXPORTAR EXCEL</button>
      </div>
    </div>
    <button class='btn-volver' (click)='volver()'>VOLVER</button>
  </div>
</div>
